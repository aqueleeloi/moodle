<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submissão de Tarefas - IEFP</title>
    <style>
        body { font-family: 'Inter', 'Segoe UI', sans-serif; background-color: #f7f9fc; color: #111; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: #ffffff; padding: 40px; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.04); width: 100%; max-width: 450px; }
        h2 { margin-top: 0; font-size: 24px; text-align: center; }
        .form-group { margin-bottom: 15px; }
        input, select { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; box-sizing: border-box; font-size: 14px; background: #f8fafc; }
        input:focus, select:focus { outline: none; border-color: #000; background: #fff; }
        button { width: 100%; padding: 14px; background: #000; color: #fff; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; transition: background 0.2s; margin-top: 10px; }
        button:hover { background: #333; }
        #google-login-btn { background: #4285F4; }
        #google-login-btn:hover { background: #357ae8; }
        .hidden { display: none; }
        .status { margin-top: 15px; text-align: center; font-size: 14px; color: #16a34a; }
    </style>
</head>
<body>

<div class="container">
    <h2>Submissão de Tarefas</h2>
    
    <div id="login-section">
        <p style="text-align: center; color: #64748b; font-size: 14px;">Inicia sessão para enviar o teu trabalho.</p>
        <button id="google-login-btn">Entrar com o Google</button>
    </div>

    <div id="upload-section" class="hidden">
        <p style="font-size: 14px; color: #64748b;">Autenticado como: <strong id="user-email"></strong></p>
        
        <form id="upload-form">
            <div class="form-group">
                <input type="text" id="student-name" placeholder="Nome Completo" required>
            </div>
            <div class="form-group">
                <input type="text" id="student-id" placeholder="N.º de Formando" required>
            </div>
            <div class="form-group">
                <select id="task-select" required>
                    <option value="" disabled selected>Selecione a Tarefa...</option>
                    <option value="UFCD_Animacao_2D">Animação 2D - Projeto Final</option>
                    <option value="UFCD_Comunicacao_Grafica">Comunicação Gráfica - Exercício 1</option>
                    <option value="UFCD_Tecnicas_Vendas">Técnicas de Vendas - Relatório</option>
                </select>
            </div>
            <div class="form-group">
                <input type="file" id="file-upload" required>
            </div>
            <button type="submit" id="submit-btn">Enviar Trabalho</button>
        </form>
        <div id="status-message" class="status"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
    import { getStorage, ref, uploadBytes } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-storage.js";

    // 🔴 SUBSTITUI ISTO PELAS TUAS CHAVES DO FIREBASE 🔴
    const firebaseConfig = {
        apiKey: "COLA_AQUI_A_TUA_API_KEY",
        authDomain: "TEU_PROJETO.firebaseapp.com",
        projectId: "TEU_PROJETO",
        storageBucket: "TEU_PROJETO.appspot.com",
        messagingSenderId: "TEU_ID",
        appId: "TEU_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth();
    const storage = getStorage(app);
    const provider = new GoogleAuthProvider();

    const loginBtn = document.getElementById('google-login-btn');
    const loginSection = document.getElementById('login-section');
    const uploadSection = document.getElementById('upload-section');
    const userEmailSpan = document.getElementById('user-email');
    const uploadForm = document.getElementById('upload-form');
    const statusMessage = document.getElementById('status-message');
    const submitBtn = document.getElementById('submit-btn');

    // Lógica de Login
    loginBtn.addEventListener('click', () => {
        signInWithPopup(auth, provider).then((result) => {
            loginSection.classList.add('hidden');
            uploadSection.classList.remove('hidden');
            userEmailSpan.textContent = result.user.email;
        }).catch((error) => {
            alert("Erro no login: " + error.message);
        });
    });

    // Lógica de Upload
    uploadForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        submitBtn.textContent = "A enviar...";
        submitBtn.disabled = true;

        const file = document.getElementById('file-upload').files[0];
        const studentName = document.getElementById('student-name').value.replace(/[^a-zA-Z0-9 ]/g, "");
        const studentId = document.getElementById('student-id').value;
        const task = document.getElementById('task-select').value;
        
        // Cria o caminho no Storage: Tarefa / Numero_Nome_NomeDoFicheiro
        const fileName = `${task}/${studentId}_${studentName}_${file.name}`;
        const storageRef = ref(storage, fileName);

        try {
            await uploadBytes(storageRef, file);
            statusMessage.textContent = "Trabalho enviado com sucesso!";
            uploadForm.reset();
        } catch (error) {
            statusMessage.style.color = "red";
            statusMessage.textContent = "Erro ao enviar: " + error.message;
        } finally {
            submitBtn.textContent = "Enviar Trabalho";
            submitBtn.disabled = false;
        }
    });
</script>
</body>
</html>
